# Intelligent Process Reaper package configuration
name: "process-reaper"
arch: "amd64"
platform: "linux"
version: "1.2.9"
section: "utils"
priority: "extra"
maintainer: "Israel Pascual Fuente <israelpascualfuente@gmail.com>"
description: |
  Intelligent Process Reaper — A standalone Go daemon for Linux that identifies,
  analyzes, and kills hanging processes based on configurable regex patterns.
  Features forensic data collection (RSS/VMS, open files) before termination,
  graceful SIGTERM → SIGKILL with configurable grace period, and audit logging.
  Includes intelligent filtering by process uptime and orphan status (PPID == 1).
vendor: "Ari Ben Canaan"
homepage: "https://github.com/clawbotari/process-reaper"
license: "MIT"
contents:
  # Binary
  - src: build/process-reaper
    dst: /usr/local/bin/process-reaper
    file_info:
      mode: 0755
      owner: root
      group: root
  # Systemd service unit
  - src: process-reaper.service
    dst: /lib/systemd/system/process-reaper.service
    file_info:
      mode: 0644
      owner: root
      group: root
  # Logrotate configuration
  - src: etc/logrotate.d/process-reaper
    dst: /etc/logrotate.d/process-reaper
    type: config
    file_info:
      mode: 0644
      owner: root
      group: root
overrides:
  deb:
    scripts:
      postinstall: scripts/postinst.sh
      preremove: scripts/prerm.sh
  rpm:
    scripts:
      postinstall: scripts/postinst.sh
      preremove: scripts/prerm.sh
